# Сборка и тесты на каждый push / PR.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # ТЗ: Go 1.22+; на раннерах обычно есть 1.22–1.24
        go-version: ["1.22.x", "1.23.x"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Go mod download
        run: go mod download

      - name: Test
        run: go test ./... -count=1 -race

      - name: Build loglint
        run: go build -o loglint ./cmd/loglint

      - name: Upload binary (artifact)
        if: matrix.go-version == '1.23.x'
        uses: actions/upload-artifact@v4
        with:
          name: loglint-linux-amd64
          path: loglint
